name: ConnectOS CI

# Mirrors the v1.0 release checklist. Keep this workflow aligned with:
# - docs/RELEASE_CHECKLIST.md
# - docs/GITHUB_RELEASE_SETUP.md
# - .github/PULL_REQUEST_TEMPLATE.md
#
# Branch protection is an owner-managed GitHub setting. This workflow defines
# the release quality gate only; it does not claim branch protection is already
# configured.
# Release-check anchor: Branch protection owner-managed GitHub setting.
#
# Keep the CI command identical to the local release gate.
# Release-check anchor: Keep CI command identical local release gate.
# `pnpm release:check` includes release docs, package metadata, release hygiene,
# tests, lint, typecheck, Prisma validation, and Next.js build.

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: v1 Release Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm 10.14.0
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run release gate
        run: pnpm release:check
